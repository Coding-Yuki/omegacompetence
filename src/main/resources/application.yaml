server:
  port: 9090   # tu peux changer ici si 8080 est déjà utilisé (ex: 9090)

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/billing_db?useSSL=false&serverTimezone=UTC
    username: billing_user
    password: motDePasseFort
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # crée/maj les tables automatiquement
    show-sql: true       # affiche les requêtes SQL dans la console
    properties:
      hibernate.format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OMEGA COMPETENCE IT Helpdesk — Admin dashboard" />
  <title>IT Support Dashboard — OMEGA COMPETENCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="CSS/style.css" />
  <style>
    /* ========== ADMIN DASHBOARD STYLES ========== */
    .admin-body {
      background: #fafbfc;
    }

    /* Header */
    .admin-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .admin-logo img {
      height: 100px;
      width: auto;
    }

    .admin-logo-text {
      font-weight: 700;
      font-size: 18px;
      color: #111827;
      letter-spacing: 0.05em;
      display: none;
    }

    .admin-logo-sub {
      display: none;
    }

    .admin-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-nav-link {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s ease;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .admin-nav-link:hover {
      color: #111827;
      background: #f3f4f6;
    }

    .admin-nav-link.active {
      color: #ed1c24;
      background: #fef2f2;
    }

    /* Main content - full width database style */
    .admin-main {
      max-width: 100%;
      padding: 24px 32px 60px;
    }

    /* Page header */
    .admin-page-header {
      margin-bottom: 24px;
    }

    .admin-page-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .admin-page-header p {
      font-size: 14px;
      color: #6b7280;
    }

    /* Search and filter bar */
    .admin-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .admin-search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    .admin-search:focus {
      outline: none;
      border-color: #ed1c24;
      box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.1);
    }

    .admin-filter {
      padding: 10px 36px 10px 14px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 4.5L6 8L9.5 4.5' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 12px center;
      appearance: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .admin-filter:focus {
      outline: none;
      border-color: #ed1c24;
    }

    /* Ticket list - database style full width */
    .admin-ticket-list {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .admin-ticket-list-header {
      display: grid;
      grid-template-columns: 1fr 120px 140px 180px;
      gap: 0;
      background: #f3f4f6;
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e5e7eb;
    }

    .admin-ticket-item {
      background: #fff;
      border: none;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr 120px 140px 180px;
      gap: 16px;
      align-items: center;
      transition: background 0.15s ease;
      cursor: pointer;
    }

    .admin-ticket-item:hover {
      background: #fafbfc;
    }

    .admin-ticket-item:focus {
      outline: 2px solid #ed1c24;
      outline-offset: -2px;
    }
      outline-offset: 2px;
    }

    .admin-ticket-info {
      flex: 1;
      min-width: 0;
    }

    .admin-ticket-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-ticket-submitter {
      font-size: 13px;
      color: #6b7280;
    }

    .admin-ticket-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .admin-priority {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .admin-priority--low {
      background: #dcfce7;
      color: #16a34a;
    }

    .admin-priority--medium {
      background: #fef9c3;
      color: #a16207;
    }

    .admin-priority--high {
      background: #fee2e2;
      color: #dc2626;
    }

    .admin-status {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .admin-status--open { background: #eef2ff; color: #4f46e5; }
    .admin-status--in-progress { background: #fff7ed; color: #c2410c; }
    .admin-status--resolved { background: #dcfce7; color: #16a34a; }
    .admin-status--closed { background: #f1f5f9; color: #64748b; }

    .admin-status-select {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 24px 4px 10px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f8fafc url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 10 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l3 3 3-3' stroke='%236b7280' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 6px center;
      appearance: none;
      cursor: pointer;
    }

    .admin-status-select:focus {
      outline: none;
      border-color: #ed1c24;
    }

    /* States */
    .admin-loading, .admin-empty {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .admin-empty h3 {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .admin-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #ed1c24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header { padding: 0 16px; }
      .admin-main { padding: 24px 16px 40px; }
      .admin-toolbar { flex-direction: column; }
      .admin-search { min-width: 100%; }
      .admin-filter { width: 100%; }
      .admin-ticket-item { flex-direction: column; align-items: flex-start; }
      .admin-ticket-meta { width: 100%; justify-content: flex-start; margin-top: 12px; }
    }

    @media (max-width: 480px) {
      .admin-ticket-meta { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body class="admin-body">

  <!-- ========== HEADER WITH NAV ========== -->
  <header class="admin-header">
<div class="admin-logo" style="display:flex;align-items:center;gap:12px;">
      <img src="images/logo.png" alt="OMEGA COMPETENCE" style="height:150px;width:auto;display:block;" />
      <span class="admin-logo-text">OMEGA COMPETENCE</span>
      <span class="admin-logo-sub"> · IT Support</span>
    </div>
    </div>
    <nav class="admin-nav" aria-label="Main navigation">
      <span class="admin-nav-link active">Tickets</span>
      <button type="button" class="admin-nav-link" id="logout-btn">Logout</button>
    </nav>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="admin-main" id="main">

    <div class="admin-page-header">
      <h1>Support Tickets</h1>
      <p>Manage and track all support requests</p>
    </div>

    <!-- Search and filter -->
    <div class="admin-toolbar">
      <input type="search" id="search-input" class="admin-search" placeholder="Search by name or title..." aria-label="Search tickets" />
      <select id="filter-status" class="admin-filter" aria-label="Filter by status">
        <option value="">All Status</option>
        <option value="open">Open</option>
        <option value="in-progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <select id="filter-priority" class="admin-filter" aria-label="Filter by priority">
        <option value="">All Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>

    <!-- Loading state -->
    <div id="state-loading" class="admin-loading" aria-live="polite">
      <div class="admin-spinner"></div>
      <p>Loading tickets...</p>
    </div>

    <!-- Empty state -->
    <div id="state-empty" class="admin-empty" hidden>
      <h3>No tickets found</h3>
      <p>No tickets match your current filters.</p>
    </div>

    <!-- Ticket list -->
    <div id="ticket-list" class="admin-ticket-list" hidden></div>

  </main>

  <script type="module" src="JS/admin.js"></script>
  <script type="module">
    import { auth } from "./JS/firebase.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    document.getElementById("logout-btn")?.addEventListener("click", async () => {
      await signOut(auth);
      window.location.replace("index.html");
    });
  </script>

</body>
</html>

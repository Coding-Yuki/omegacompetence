<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View your submitted IT support tickets." />
  <title>My Tickets — OMEGA COMPETENCE IT Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="CSS/style.css" />
  <style>
    /* ========== MY TICKETS PAGE STYLES ========== */
    .emp-body {
      background: #fafbfc;
    }

    .emp-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .emp-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .emp-logo img {
      height: 100px;
      width: auto;
    }

    .emp-logo-text {
      display: none;
    }

    .emp-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .emp-nav-link {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s ease;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .emp-nav-link:hover {
      color: #111827;
      background: #f3f4f6;
    }

    .emp-nav-link.active {
      color: #ed1c24;
      background: #fef2f2;
    }

    .emp-main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .emp-hero {
      margin-bottom: 32px;
    }

    .emp-hero h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .emp-hero p {
      font-size: 14px;
      color: #6b7280;
    }

    /* Ticket list */
    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ticket-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px;
      transition: box-shadow 0.15s ease;
    }

    .ticket-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .ticket-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }

    .ticket-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin: 0;
    }

    .ticket-id {
      font-size: 12px;
      color: #9ca3af;
      font-family: monospace;
    }

    .ticket-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #6b7280;
    }

    .ticket-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .status--open {
      background: #eef2ff;
      color: #4f46e5;
    }

    .status--in-progress {
      background: #fff7ed;
      color: #c2410c;
    }

    .status--resolved {
      background: #dcfce7;
      color: #16a34a;
    }

    .status--closed {
      background: #f1f5f9;
      color: #64748b;
    }

    /* Priority */
    .priority-badge {
      font-size: 12px;
      font-weight: 500;
    }

    .priority--low { color: #16a34a; }
    .priority--medium { color: #ca8a04; }
    .priority--high { color: #dc2626; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state svg {
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
    }

    .empty-state a {
      color: #ed1c24;
      font-weight: 500;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #ed1c24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .emp-header { padding: 0 16px; }
      .emp-main { padding: 24px 16px 40px; }
      .ticket-card { padding: 16px; }
      .ticket-card-header { flex-direction: column; gap: 8px; }
      .ticket-meta { flex-direction: column; gap: 8px; }
    }
  </style>
</head>

<body class="emp-body">

  <!-- ========== HEADER WITH NAV ========== -->
  <header class="emp-header">
    <div class="emp-logo" style="display:flex;align-items:center;gap:12px;">
      <img src="images/logo.png" alt="OMEGA COMPETENCE" style="height:150px;width:auto;display:block;" />
      <span class="emp-logo-text">OMEGA COMPETENCE</span>
    </div>
    <nav class="emp-nav" aria-label="Main navigation">
      <a href="index.html" class="emp-nav-link">New Ticket</a>
      <a href="my-tickets.html" class="emp-nav-link active">My Tickets</a>
      <button type="button" class="emp-nav-link" id="logout-btn">Logout</button>
    </nav>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="emp-main" id="main">

    <section class="emp-hero">
      <h1>My Tickets</h1>
      <p>View all the support tickets you've submitted.</p>
    </section>

    <!-- Loading state -->
    <div id="loading-state" class="loading-state">
      <div class="spinner"></div>
      <p>Loading your tickets...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="12" width="32" height="28" rx="4" stroke="#9ca3af" stroke-width="2"/>
        <path d="M16 22h16M16 30h10" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h3>No tickets yet</h3>
      <p>You haven't submitted any support tickets.<br /><a href="index.html">Submit your first ticket</a></p>
    </div>

    <!-- Ticket list -->
    <div id="ticket-list" class="ticket-list" hidden></div>

  </main>

  <script type="module">
    import "./JS/toast.js";
    import { db, auth } from "./JS/firebase.js";
    import { CONFIG } from "./JS/config.js";
    import { collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const loadingState = document.getElementById("loading-state");
    const emptyState = document.getElementById("empty-state");
    const ticketList = document.getElementById("ticket-list");

    const statusLabels = {
      "open": "Open",
      "in-progress": "In Progress",
      "resolved": "Resolved",
      "closed": "Closed"
    };

    const priorityLabels = {
      "low": "Low",
      "medium": "Medium",
      "high": "High"
    };

    function formatDate(ts) {
      if (!ts?.toDate) return "—";
      return ts.toDate().toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderTicket(ticket) {
      const statusClass = `status--${ticket.status || 'open'}`;
      const priorityClass = `priority--${ticket.priority || 'low'}`;

      return `
        <div class="ticket-card">
          <div class="ticket-card-header">
            <div>
              <h3 class="ticket-title">${ticket.issueTitle || 'Untitled'}</h3>
              <span class="ticket-id">${ticket.submittedBy || ''}</span>
            </div>
            <span class="status-badge ${statusClass}">${statusLabels[ticket.status] || 'Open'}</span>
          </div>
          <div class="ticket-meta">
            <span class="ticket-meta-item">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              ${formatDate(ticket.submittedAt)}
            </span>
            <span class="ticket-meta-item priority-${ticket.priority}">
              Priority: <strong>${priorityLabels[ticket.priority] || 'Low'}</strong>
            </span>
          </div>
        </div>
      `;
    }

    async function loadTickets(userEmail) {
      try {
        const q = query(
          collection(db, CONFIG.COLLECTIONS.TICKETS),
          where("submittedBy", "==", userEmail),
          orderBy("submittedAt", "desc")
        );

        const snapshot = await getDocs(q);
        const tickets = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

        loadingState.hidden = true;

        if (tickets.length === 0) {
          emptyState.hidden = false;
          return;
        }

        ticketList.innerHTML = tickets.map(renderTicket).join("");
        ticketList.hidden = false;

      } catch (err) {
        console.error("Failed to load tickets:", err);
        loadingState.innerHTML = '<p style="color:#dc2626">Failed to load tickets. Please try again.</p>';
      }
    }

    // Auth guard
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.replace("index.html");
        return;
      }
      loadTickets(user.email);
    });

    // Logout button
    document.getElementById("logout-btn")?.addEventListener("click", async () => {
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
      await signOut(auth);
      window.location.replace("index.html");
    });
  </script>

</body>

</html>
